---
apiVersion: agent.kagenti.dev/v1alpha1
kind: Agent
metadata:
  name: data-agent
  namespace: agentic-ml
  labels:
    app.kubernetes.io/name: data-agent
    kagenti.io/type: agent
    protocol.kagenti.io/a2a: ""
spec:
  description: Data loading and preprocessing agent
  imageSource:
    image: registry.cr-system.svc.cluster.local:5000/demo-ml-agent:latest
  replicas: 1
  servicePorts:
    - name: http
      port: 8000
      protocol: TCP
  podTemplateSpec:
    spec:
      serviceAccountName: data-agent
      containers:
        - name: agent
          image: registry.cr-system.svc.cluster.local:5000/demo-ml-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: AGENT_NAME
              value: data-agent
            - name: AGENT_DESCRIPTION
              value: Data loading and preprocessing agent
            - name: AGENT_SKILLS
              value: data-loading,preprocessing
            - name: AGENT_CAPABILITIES
              value: read:features
            - name: MODEL_REGISTRY_URL
              value: http://model-registry.agentic-ml.svc.cluster.local:8080
            - name: AGENT_ENDPOINT
              value: http://data-agent.agentic-ml.svc.cluster.local:8000
            # OpenTelemetry configuration for Layer 3 traces
            - name: OTEL_ENABLED
              value: "true"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger.observability.svc.cluster.local:4317"
            - name: LLM_MODE
              value: "mock"
            - name: OPENAI_API_KEY
              value: "mock-key-for-demo"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
---
