---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-agent
  namespace: classic-ml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-agent
  template:
    metadata:
      labels:
        app: data-agent
    spec:
      serviceAccountName: ml-pipeline-sa
      containers:
        - name: agent
          image: registry.cr-system.svc.cluster.local:5000/demo-ml-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: AGENT_NAME
              value: data-agent
            - name: AGENT_DESCRIPTION
              value: "Data loading and preprocessing agent"
            - name: AGENT_SKILLS
              value: "data-loading,preprocessing"
            - name: MODEL_REGISTRY_URL
              value: "http://model-registry.classic-ml.svc.cluster.local:8080"
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: data-agent
  namespace: classic-ml
spec:
  selector:
    app: data-agent
  ports:
    - port: 8000
      targetPort: 8000
